{% load static %}
{% load favicon_tags %}

<!DOCTYPE html>
<head>
  {% favicon_meta %}
  <title>{% block title %}Anj Lapastora{% endblock %}</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Cousine&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/instrument-serif" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<script>
window.addEventListener("load", () => {
  document.querySelectorAll(".fade-in").forEach(el => {
    el.classList.add("visible");
  });
});
</script>
<body>
<style>
    * {
  margin: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Wrapper controls vertical rhythm */
.wrapper {
  text-align: center;
  max-width: 500px;
}

/* Header (your exact style) */
.title {
  color: #A74d4a;
  font-family: 'Instrument Serif';
  letter-spacing: -.03em;
  font-size: 110px;
  font-weight: 400;
  margin-bottom: 40px;
}

/* Subtitle */
.subtitle {
  font-family: 'Cousine', monospace;
  color: #A74d4a;
  font-size: 14.9px;
  line-height: 1.6;
  margin-bottom: 50px;
}

/* Nav container */
.nav {
  display: flex;
  flex-direction: column;
  gap: 25px;
  align-items: center;
}

/* Your exact nav style */
.nav a {
  margin: 0;
  width: 280px;
  text-align: center;
}

/* underline lines */
.nav a::after {
  content: "";
  display: block;
  width: 100%;
  height: 1px;
  background: #A74d4a;
  margin-top: 10px;
}

</style>

  <main class="wrapper fade-in">
    <h1 class="title fade-in" style="transition-delay: 0ms;">Anj Lapastora</h1>
    <nav class="nav fade-in" style="transition-delay: 0.6s;">
      <a href="/about">About</a>
      <a href="/tech">Tech</a>
      <a href="/atelier">Atelier</a>
      <a href="/musings">Musings</a>
    </nav>

  </main>

</body>
</html>
